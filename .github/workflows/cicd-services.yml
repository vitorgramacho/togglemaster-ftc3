# =============================================================================
# CI/CD — ToggleMaster Microsserviços (workflow CONSOLIDADO)
#
# Estrutura:
#   1) detect-changes  → paths-filter identifica quais serviços mudaram
#   2) ci-auth         → pipeline completo do auth-service (se mudou)
#   3) ci-flag         → pipeline completo do flag-service (se mudou)
#   4) ci-targeting    → pipeline completo do targeting-service (se mudou)
#   5) ci-evaluation   → pipeline completo do evaluation-service (se mudou)
#   6) ci-analytics    → pipeline completo do analytics-service (se mudou)
#   7) ci-self-healing → pipeline do self-healing-webhook (Fase 4, se mudou)
#   8) ci-summary      → agrega resultado dos 6; único check obrigatório
#
# Os 6 jobs do meio rodam EM PARALELO (todos dependem apenas de
# detect-changes). Cada um chama o workflow reutilizável
# `_reusable-cicd.yml` com parâmetros explícitos.
#
# NOTA Fase 4: o self-healing-webhook NÃO segue a convenção de pasta
# "<service>-service" dos outros 5. Por isso seu job passa o input
# `service_dir: services/self-healing-webhook` ao reusable.
# =============================================================================

name: CI/CD Microservices

on:
  pull_request:
    branches: [main]
    paths:
      - "services/**"
      - "gitops/base/**"
      - ".github/workflows/cicd-services.yml"
      - ".github/workflows/_reusable-cicd.yml"
  push:
    branches: [main]
    paths:
      - "services/**"
      - "gitops/base/**"
      - ".github/workflows/cicd-services.yml"
      - ".github/workflows/_reusable-cicd.yml"
  workflow_dispatch:
    inputs:
      force_all:
        description: "Forçar rodar TODOS os serviços, ignorando paths-filter"
        required: false
        type: boolean
        default: true

concurrency:
  group: cicd-services-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write
  security-events: write
  pull-requests: read

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # 1) DETECTAR MUDANÇAS
  # ═══════════════════════════════════════════════════════════════════════════
  detect-changes:
    name: Detectar mudanças
    runs-on: ubuntu-latest
    outputs:
      auth:       ${{ steps.filter.outputs.auth }}
      flag:       ${{ steps.filter.outputs.flag }}
      targeting:  ${{ steps.filter.outputs.targeting }}
      evaluation: ${{ steps.filter.outputs.evaluation }}
      analytics:  ${{ steps.filter.outputs.analytics }}
      self_healing: ${{ steps.filter.outputs.self_healing }}
      force_all:  ${{ steps.compute.outputs.force_all }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Paths filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth:
              - 'services/auth-service/**'
              - 'gitops/base/auth/**'
            flag:
              - 'services/flag-service/**'
              - 'gitops/base/flag/**'
            targeting:
              - 'services/targeting-service/**'
              - 'gitops/base/targeting/**'
            evaluation:
              - 'services/evaluation-service/**'
              - 'gitops/base/evaluation/**'
            analytics:
              - 'services/analytics-service/**'
              - 'gitops/base/analytics/**'
            self_healing:
              - 'services/self-healing-webhook/**'
              - 'gitops/base/self-healing/**'

      - name: Computar "rodar todos"
        id: compute
        run: |
          FORCE=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ inputs.force_all }}" = "true" ]; then
            FORCE=true
          fi
          if git log -1 --name-only --pretty=format: 2>/dev/null | \
             grep -q '.github/workflows/_reusable-cicd.yml'; then
            FORCE=true
          fi
          echo "force_all=$FORCE" >> "$GITHUB_OUTPUT"
          echo "Rodar todos? $FORCE"

  # ═══════════════════════════════════════════════════════════════════════════
  # 2) AUTH-SERVICE
  # ═══════════════════════════════════════════════════════════════════════════
  ci-auth:
    name: auth-service
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.force_all == 'true' ||
      needs.detect-changes.outputs.auth == 'true'
    uses: ./.github/workflows/_reusable-cicd.yml
    with:
      service: auth
      language: go
      ecr_repository: togglemaster-auth
      gitops_path: gitops/base/auth/deployment.yaml
    secrets:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN:     ${{ secrets.AWS_SESSION_TOKEN }}
      GITOPS_TOKEN:          ${{ secrets.GITOPS_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # 3) FLAG-SERVICE
  # ═══════════════════════════════════════════════════════════════════════════
  ci-flag:
    name: flag-service
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.force_all == 'true' ||
      needs.detect-changes.outputs.flag == 'true'
    uses: ./.github/workflows/_reusable-cicd.yml
    with:
      service: flag
      language: python
      ecr_repository: togglemaster-flag
      gitops_path: gitops/base/flag/deployment.yaml
    secrets:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN:     ${{ secrets.AWS_SESSION_TOKEN }}
      GITOPS_TOKEN:          ${{ secrets.GITOPS_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # 4) TARGETING-SERVICE
  # ═══════════════════════════════════════════════════════════════════════════
  ci-targeting:
    name: targeting-service
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.force_all == 'true' ||
      needs.detect-changes.outputs.targeting == 'true'
    uses: ./.github/workflows/_reusable-cicd.yml
    with:
      service: targeting
      language: python
      ecr_repository: togglemaster-targeting
      gitops_path: gitops/base/targeting/deployment.yaml
    secrets:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN:     ${{ secrets.AWS_SESSION_TOKEN }}
      GITOPS_TOKEN:          ${{ secrets.GITOPS_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # 5) EVALUATION-SERVICE
  # ═══════════════════════════════════════════════════════════════════════════
  ci-evaluation:
    name: evaluation-service
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.force_all == 'true' ||
      needs.detect-changes.outputs.evaluation == 'true'
    uses: ./.github/workflows/_reusable-cicd.yml
    with:
      service: evaluation
      language: go
      ecr_repository: togglemaster-evaluation
      gitops_path: gitops/base/evaluation/deployment.yaml
    secrets:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN:     ${{ secrets.AWS_SESSION_TOKEN }}
      GITOPS_TOKEN:          ${{ secrets.GITOPS_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # 6) ANALYTICS-SERVICE
  # ═══════════════════════════════════════════════════════════════════════════
  ci-analytics:
    name: analytics-service
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.force_all == 'true' ||
      needs.detect-changes.outputs.analytics == 'true'
    uses: ./.github/workflows/_reusable-cicd.yml
    with:
      service: analytics
      language: python
      ecr_repository: togglemaster-analytics
      gitops_path: gitops/base/analytics/deployment.yaml
    secrets:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN:     ${{ secrets.AWS_SESSION_TOKEN }}
      GITOPS_TOKEN:          ${{ secrets.GITOPS_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # 7) SELF-HEALING WEBHOOK (Fase 4)
  # ═══════════════════════════════════════════════════════════════════════════
  ci-self-healing:
    name: self-healing-webhook
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.force_all == 'true' ||
      needs.detect-changes.outputs.self_healing == 'true'
    uses: ./.github/workflows/_reusable-cicd.yml
    with:
      service: self-healing-webhook
      language: python
      ecr_repository: togglemaster-self-healing-webhook
      gitops_path: gitops/base/self-healing/deployment.yaml
      # IMPORTANTE: a pasta deste serviço é "services/self-healing-webhook"
      # (sem o sufixo "-service" dos outros). Por isso passamos service_dir
      # explícito; sem ele o reusable procuraria "self-healing-webhook-service".
      service_dir: services/self-healing-webhook
    secrets:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN:     ${{ secrets.AWS_SESSION_TOKEN }}
      GITOPS_TOKEN:          ${{ secrets.GITOPS_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # 8) RESUMO — agrega resultado dos 6 jobs.
  # ═══════════════════════════════════════════════════════════════════════════
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [ci-auth, ci-flag, ci-targeting, ci-evaluation, ci-analytics, ci-self-healing]
    if: always()
    steps:
      - name: Avaliar resultado dos jobs
        run: |
          echo "auth:               ${{ needs.ci-auth.result }}"
          echo "flag:               ${{ needs.ci-flag.result }}"
          echo "targeting:          ${{ needs.ci-targeting.result }}"
          echo "evaluation:         ${{ needs.ci-evaluation.result }}"
          echo "analytics:          ${{ needs.ci-analytics.result }}"
          echo "self-healing:       ${{ needs.ci-self-healing.result }}"
          echo ""
          FAILED=false
          for result in \
            "${{ needs.ci-auth.result }}" \
            "${{ needs.ci-flag.result }}" \
            "${{ needs.ci-targeting.result }}" \
            "${{ needs.ci-evaluation.result }}" \
            "${{ needs.ci-analytics.result }}" \
            "${{ needs.ci-self-healing.result }}"; do
            case "$result" in
              success|skipped) ;;
              *) FAILED=true; echo "::error::Job com resultado: $result" ;;
            esac
          done
          if [ "$FAILED" = "true" ]; then
            echo "::error::Um ou mais serviços falharam."
            exit 1
          fi
          echo "Todos os serviços passaram (ou foram pulados)."
