# =============================================================================
#
# Provisiona toda a infraestrutura AWS necessária para o projeto:
#   - VPC + subnets + NAT
#   - EKS cluster + Node Group (usando LabRole)
#   - 3 RDS PostgreSQL + ElastiCache + DynamoDB + SQS + 5 ECR
#   - Bootstrap K8s (namespaces, secrets, configmaps, metrics-server)
#   - ArgoCD (Helm) + 5 Applications apontando para gitops/base/
#
# Trigger:
#   - workflow_dispatch  → escolher action: plan | apply | destroy
#   - push em main com mudanças em terraform/**  → roda PLAN
#   - pull_request em terraform/**               → roda PLAN e comenta no PR
#
# Jobs:
#   1) terraform-plan      → sempre que dispara; gera artifact tfplan
#   2) terraform-apply     → se action=apply OU push na main; provisiona
#                            tudo e captura outputs (cluster_name etc.)
#   3) post-apply-check    → após apply: kubectl wait no ArgoCD, lista
#                            Applications, expõe senha admin (mascarada).
#   4) terraform-destroy   → se action=destroy: limpa Applications e
#                            destrói tudo. Usa Environment "production-destroy"
#                            para forçar aprovação manual.
#
# Segredos utilizados no repositório (Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_SESSION_TOKEN       (AWS Academy — credenciais temporárias)
#   TF_STATE_BUCKET         (nome do bucket S3 do tfstate)
# =============================================================================

name: Terraform Infra

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Ação Terraform"
        required: true
        type: choice
        default: plan
        options: [plan, apply, destroy]
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-infra.yml"
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"

# Evitar mais de 1 run de infra de vez
concurrency:
  group: terraform-infra
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write   
  id-token: write

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.10.0"     
  WORKING_DIR: ./terraform

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # 1) PLAN — sempre roda (PR, push em main, workflow_dispatch)
  # ═══════════════════════════════════════════════════════════════════════════
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.action != 'destroy'
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Garantir bucket S3 do tfstate (idempotente)
        run: |
          BUCKET="${{ secrets.TF_STATE_BUCKET }}"
          if [ -z "$BUCKET" ]; then
            echo "::error::Secret TF_STATE_BUCKET não definido."
            exit 1
          fi
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Criando bucket $BUCKET..."
            aws s3api create-bucket --bucket "$BUCKET" --region "$AWS_REGION"
            aws s3api put-bucket-versioning --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption --bucket "$BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            echo "Bucket criado."
          else
            echo "Bucket $BUCKET já existe — OK."
          fi

      - name: Terraform fmt -check
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=togglemaster/fase3/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      - name: Gerar terraform.tfvars dinâmico
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          cat > terraform.tfvars <<EOF
          aws_region      = "${{ env.AWS_REGION }}"
          gitops_repo_url = "${{ github.server_url }}/${{ github.repository }}.git"
          EOF
          echo "tfvars gerado:"
          cat terraform.tfvars

      - name: Terraform plan
        id: plan
        env:
          TF_LOG: ERROR
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set +e
          terraform plan -out=tfplan -detailed-exitcode -no-color | tee plan.txt
          EXIT=${PIPESTATUS[0]}
          set -e
          echo "Exit code do plan: $EXIT"
          # detailed-exitcode: 0 = sem mudanças, 1 = erro, 2 = há mudanças
          case "$EXIT" in
            0) echo "has_changes=false" >> "$GITHUB_OUTPUT" ;;
            2) echo "has_changes=true"  >> "$GITHUB_OUTPUT" ;;
            *) echo "Erro no plan"; exit 1 ;;
          esac

      - name: Upload tfplan (artifact)
        if: steps.plan.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: |
            ${{ env.WORKING_DIR }}/tfplan
            ${{ env.WORKING_DIR }}/terraform.tfvars
          retention-days: 7

      - name: Comentar plan no PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planPath = '${{ env.WORKING_DIR }}/plan.txt';
            let plan = '';
            try {
              plan = fs.readFileSync(planPath, 'utf8');
              if (plan.length > 60000) plan = plan.slice(0, 60000) + '\n... (truncado)';
            } catch (e) {
              plan = '(plan não disponível)';
            }
            const body = [
              '### Terraform plan',
              `changes detected: \`${{ steps.plan.outputs.has_changes }}\``,
              '',
              '<details><summary>Plan textual</summary>',
              '',
              '```hcl',
              plan,
              '```',
              '</details>'
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # ═══════════════════════════════════════════════════════════════════════════
  # 2) APPLY — só se action=apply OU push na main com mudanças
  # ═══════════════════════════════════════════════════════════════════════════
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.action == 'apply') ||
      (github.event_name == 'push' && needs.terraform-plan.outputs.has_changes == 'true')
    # Use GitHub Environment "production" se quiser exigir aprovação manual:
    # Settings → Environments → production → required reviewers.
    environment:
      name: production
    outputs:
      cluster_name: ${{ steps.outputs.outputs.cluster_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=togglemaster/fase3/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Gerar terraform.tfvars
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          cat > terraform.tfvars <<EOF
          aws_region      = "${{ env.AWS_REGION }}"
          gitops_repo_url = "${{ github.server_url }}/${{ github.repository }}.git"
          EOF

      # Em workflow_dispatch=apply gera plan na hora; em push reaproveita do job anterior.
      - name: Download tfplan (artifact)
        if: github.event_name == 'push'
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}

      - name: Terraform apply
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if [ -f tfplan ]; then
            echo "Aplicando plan salvo do job anterior..."
            terraform apply -auto-approve tfplan
          else
            echo "Apply direto (workflow_dispatch)..."
            terraform apply -auto-approve
          fi

      - name: Capturar outputs
        id: outputs
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          CLUSTER=$(terraform output -raw cluster_name)
          echo "cluster_name=$CLUSTER" >> "$GITHUB_OUTPUT"
          echo "─── Outputs principais ───"
          terraform output

  # ═══════════════════════════════════════════════════════════════════════════
  # 3) POST-APPLY — kubectl bootstrap: espera ArgoCD subir, valida Apps,
  #    expõe senha admin (mascarada).
  # ═══════════════════════════════════════════════════════════════════════════
  post-apply-check:
    name: Post-Apply Validation (kubectl)
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: needs.terraform-apply.result == 'success'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ needs.terraform-apply.outputs.cluster_name }}
          kubectl version --client

      - name: Esperar ArgoCD ficar pronto
        run: |
          echo "Aguardando deployment argocd-server..."
          kubectl wait --for=condition=available --timeout=300s \
            deployment/argocd-server -n argocd
          echo "Aguardando deployment argocd-repo-server..."
          kubectl wait --for=condition=available --timeout=300s \
            deployment/argocd-repo-server -n argocd
          echo "ArgoCD pronto."

      # ═══════════════════════════════════════════════════════════════════════
      # Fase 4 — Secrets de observabilidade (Datadog + Alertmanager/PagerDuty)
      # -----------------------------------------------------------------------
      # Estes secrets NÃO podem ir para o Git (contêm chaves sensíveis). Em vez
      # disso, vêm dos GitHub Secrets do repositório e são criados aqui, ANTES
      # do ArgoCD sincronizar as Applications de observability — assim o Datadog
      # Agent e o Alertmanager já encontram seus secrets quando sobem.
      #
      # GitHub Secrets necessários (Settings → Secrets and variables → Actions):
      #   DD_API_KEY                  → API key do Datadog
      #   DD_SITE                     → site do Datadog (ex: us5.datadoghq.com)
      #   PAGERDUTY_INTEGRATION_KEY   → integration key do PagerDuty (Events API V2)
      #
      # NOTA TÉCNICA: o GitHub Actions NÃO permite usar `secrets.X` direto em
      # condições `if:` (sempre avalia como vazio). Por isso o step "gate" abaixo
      # lê os secrets via env e publica flags em outputs; os steps seguintes
      # decidem com base nessas flags.
      # ═══════════════════════════════════════════════════════════════════════
      - name: Checkout (para ler o manifesto do Alertmanager)
        uses: actions/checkout@v4

      - name: Verificar quais secrets de observabilidade existem
        id: obs-secrets
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          PD_KEY: ${{ secrets.PAGERDUTY_INTEGRATION_KEY }}
        run: |
          if [ -n "$DD_API_KEY" ]; then
            echo "has_datadog=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_datadog=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$PD_KEY" ]; then
            echo "has_pagerduty=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pagerduty=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Criar secret do Datadog
        if: steps.obs-secrets.outputs.has_datadog == 'true'
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_SITE: ${{ secrets.DD_SITE }}
        run: |
          # Garante o namespace (o ArgoCD também cria, mas pode ainda não ter rodado)
          kubectl create namespace observability \
            --dry-run=client -o yaml | kubectl apply -f -

          # Default do site caso o GitHub Secret DD_SITE não esteja definido
          SITE="${DD_SITE:-us5.datadoghq.com}"

          # "create --dry-run | apply" = idempotente (cria ou atualiza)
          kubectl -n observability create secret generic datadog-secret \
            --from-literal=api-key="${DD_API_KEY}" \
            --from-literal=DD_API_KEY="${DD_API_KEY}" \
            --from-literal=DD_SITE="${SITE}" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "Secret datadog-secret aplicado no namespace observability."

      - name: Avisar se a chave do Datadog não estiver configurada
        if: steps.obs-secrets.outputs.has_datadog != 'true'
        run: |
          echo "::warning::GitHub Secret DD_API_KEY não definido. O Datadog Agent"
          echo "::warning::ficará sem credencial. Defina DD_API_KEY/DD_SITE em"
          echo "::warning::Settings → Secrets and variables → Actions, ou crie o"
          echo "::warning::secret manualmente (ver GUIA-EXECUCAO.md, etapa 6)."

      - name: Aplicar config do Alertmanager com a chave do PagerDuty
        if: steps.obs-secrets.outputs.has_pagerduty == 'true'
        env:
          PD_KEY: ${{ secrets.PAGERDUTY_INTEGRATION_KEY }}
        run: |
          kubectl create namespace observability \
            --dry-run=client -o yaml | kubectl apply -f -

          # Substitui o placeholder do arquivo versionado pela chave real e
          # aplica direto no cluster. O arquivo no Git permanece com o placeholder.
          sed "s/PAGERDUTY_INTEGRATION_KEY/${PD_KEY}/g" \
            gitops/base/observability/05-alertmanager-config.yaml \
            | kubectl apply -f -
          echo "Secret alertmanager-pagerduty-config aplicado."

      - name: Avisar se a chave do PagerDuty não estiver configurada
        if: steps.obs-secrets.outputs.has_pagerduty != 'true'
        run: |
          echo "::warning::GitHub Secret PAGERDUTY_INTEGRATION_KEY não definido."
          echo "::warning::O Alertmanager não conseguirá abrir incidentes no"
          echo "::warning::PagerDuty. Defina o secret ou aplique manualmente"
          echo "::warning::(ver GUIA-EXECUCAO.md, etapa 6.4)."

      - name: Forçar re-sync das Applications de observability
        if: steps.obs-secrets.outputs.has_datadog == 'true' || steps.obs-secrets.outputs.has_pagerduty == 'true'
        run: |
          # Depois de criar os secrets, "cutuca" o ArgoCD para reconciliar já —
          # caso ele tenha tentado sincronizar Datadog/Alertmanager antes dos
          # secrets existirem. Sem isso, funcionaria mesmo assim (selfHeal+retry),
          # só que mais devagar. O "|| true" evita falhar se a App ainda não foi
          # registrada pelo ArgoCD neste exato momento.
          for app in observability-stack kube-prometheus-stack datadog; do
            kubectl -n argocd annotate application "$app" \
              argocd.argoproj.io/refresh=hard --overwrite 2>/dev/null || true
          done
          echo "Refresh solicitado às Applications de observability."

      - name: Listar Applications do ArgoCD
        run: |
          echo "─── Applications no ArgoCD ───"
          kubectl get applications -n argocd -o wide || \
            echo "(sem applications ainda — pode demorar alguns segundos para o ArgoCD registrar)"

      - name: Listar namespaces dos serviços
        run: |
          echo "─── Namespaces do ToggleMaster ───"
          kubectl get namespaces | grep -E "argocd|namespace" || true

      - name: Mostrar comandos de acesso ao ArgoCD
        run: |
          echo ""
          echo "═════════════════════════════════════════════════════════"
          echo "  ArgoCD pronto. Para acessar a UI localmente:"
          echo "═════════════════════════════════════════════════════════"
          echo ""
          echo "1) Configure kubectl no seu computador:"
          echo "   aws eks update-kubeconfig --region ${{ env.AWS_REGION }} \\"
          echo "     --name ${{ needs.terraform-apply.outputs.cluster_name }}"
          echo ""
          echo "2) Pegue a senha do admin:"
          echo "   kubectl -n argocd get secret argocd-initial-admin-secret \\"
          echo "     -o jsonpath='{.data.password}' | base64 -d ; echo"
          echo ""
          echo "3) Faça port-forward:"
          echo "   kubectl -n argocd port-forward svc/argocd-server 8080:80"
          echo ""
          echo "4) Acesse: http://localhost:8080  (usuário: admin)"
          echo "═════════════════════════════════════════════════════════"

      - name: Aguardar e exibir DNS do NLB (ingress-nginx)
        run: |
          echo ""
          echo "Aguardando NLB ser provisionado pelo ingress-nginx..."
          for i in $(seq 1 24); do
            NLB=$(kubectl -n ingress-nginx get svc ingress-nginx-controller \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "$NLB" ]; then
              echo ""
              echo "═════════════════════════════════════════════════════════"
              echo "  NLB provisionado! URL base dos microsserviços:"
              echo ""
              echo "  http://${NLB}"
              echo ""
              echo "  Exemplos de uso:"
              echo "  curl http://${NLB}/auth/health"
              echo "  curl http://${NLB}/flags/health"
              echo "  curl http://${NLB}/evaluation/health"
              echo ""
              echo "  Aguarde ~60s para o DNS propagar antes de testar."
              echo "═════════════════════════════════════════════════════════"
              break
            fi
            echo "  tentativa $i/24 — NLB ainda provisionando, aguardando 10s..."
            sleep 10
          done

      - name: Mascarar senha do ArgoCD nos logs
        run: |
          # Tenta extrair a senha e mascarar nos logs (caso apareça em algum eco)
          if PASS=$(kubectl -n argocd get secret argocd-initial-admin-secret \
              -o jsonpath='{.data.password}' 2>/dev/null | base64 -d); then
            echo "::add-mask::$PASS"
            echo "Senha admin do ArgoCD mascarada nos logs (não imprimimos)."
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # 4) DESTROY — só com workflow_dispatch + action=destroy
  # ═══════════════════════════════════════════════════════════════════════════
  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
    environment:
      name: production-destroy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Terraform init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=togglemaster/fase3/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"


      - name: Limpar Applications do ArgoCD
        working-directory: ${{ env.WORKING_DIR }}
        continue-on-error: true
        run: |
          CLUSTER=$(terraform output -raw cluster_name 2>/dev/null || echo "")
          if [ -n "$CLUSTER" ]; then
            aws eks update-kubeconfig --region "$AWS_REGION" --name "$CLUSTER"
            echo "Removendo Applications do ArgoCD..."
            kubectl delete applications --all -n argocd --timeout=120s || true
            echo "Aguardando 30s para garbage collection..."
            sleep 30
          else
            echo "Cluster não encontrado no state — nada para limpar."
          fi

      - name: Gerar terraform.tfvars
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          cat > terraform.tfvars <<EOF
          aws_region      = "${{ env.AWS_REGION }}"
          gitops_repo_url = "${{ github.server_url }}/${{ github.repository }}.git"
          EOF

      - name: Terraform destroy
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform destroy -auto-approve
