apiVersion: apps/v1
kind: Deployment
metadata:
  name: targeting-service
  namespace: targeting-namespace
  labels:
    app: targeting-service
    tags.datadoghq.com/service: targeting-service
    tags.datadoghq.com/env: production
    tags.datadoghq.com/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: targeting-service
  template:
    metadata:
      labels:
        app: targeting-service
        tags.datadoghq.com/service: targeting-service
        tags.datadoghq.com/env: production
        tags.datadoghq.com/version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "9464"
        prometheus.io/path:   "/metrics"
        ad.datadoghq.com/targeting-service.logs: '[{"source":"python","service":"targeting-service"}]'
    spec:
      containers:
        - name: targeting-service
          image: 604720765096.dkr.ecr.us-east-1.amazonaws.com/togglemaster-targeting:v1.0.0
          imagePullPolicy: Always
          ports:
            - { containerPort: 8003, name: http }
            - { containerPort: 9464, name: metrics }
          env:
            - name: PORT
              value: "8003"
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: togglemaster-db-secret, key: DATABASE_URL } }
            - name: AUTH_SERVICE_URL
              valueFrom: { configMapKeyRef: { name: togglemaster-config, key: AUTH_SERVICE_URL } }
            # ===== OpenTelemetry (Fase 4) =====
            - name: OTEL_SERVICE_NAME
              value: "targeting-service"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-opentelemetry-collector.observability.svc.cluster.local:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=togglemaster,deployment.environment=production"
            - name: PYTHONUNBUFFERED
              value: "1"
            # ===== Datadog tags =====
            - name: DD_SERVICE
              valueFrom: { fieldRef: { fieldPath: "metadata.labels['tags.datadoghq.com/service']" } }
            - name: DD_ENV
              valueFrom: { fieldRef: { fieldPath: "metadata.labels['tags.datadoghq.com/env']" } }
            - name: DD_VERSION
              valueFrom: { fieldRef: { fieldPath: "metadata.labels['tags.datadoghq.com/version']" } }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "300m", memory: "256Mi" }
          readinessProbe: { httpGet: { path: /health, port: 8003 }, initialDelaySeconds: 10, periodSeconds: 5 }
          livenessProbe:  { httpGet: { path: /health, port: 8003 }, initialDelaySeconds: 30, periodSeconds: 15 }
