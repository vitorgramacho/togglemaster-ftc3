# =============================================================================
# ArgoCD "App-of-Apps": observability-stack
# ---------------------------------------------------------------------------
# Esta Application aponta para o diretório que contém TODAS as outras
# Applications da stack de observabilidade (01- a 08-). É o ponto de entrada
# único: criar/aplicar SÓ este YAML faz o ArgoCD descobrir e sincronizar
# Prometheus, Loki, OTel, Datadog, Alertmanager config, dashboards, regras
# e o self-healing.
#
# Como usar:
#   kubectl apply -f gitops/base/observability/_app-of-apps.yaml
#
# Estrutura final no ArgoCD:
#   observability-stack
#     ├── kube-prometheus-stack
#     ├── loki
#     ├── opentelemetry-collector
#     ├── datadog
#     ├── (raw manifests: namespace, alertmanager-config, rules, dashboard)
#     └── self-healing-webhook
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # Substituir pelo repo real no momento do bootstrap (ver DEPLOYMENT.md)
    repoURL: https://github.com/SEU-USUARIO/togglemaster-fase4.git
    targetRevision: main
    path: gitops/base/observability
    # Ordena pelo prefixo numérico nos arquivos: 00- < 01- < ... < 08-
    directory:
      recurse: false
      jsonnet: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
