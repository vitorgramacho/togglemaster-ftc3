apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-service
  namespace: evaluation-namespace
  labels: { app: evaluation-service }
spec:
  replicas: 2
  selector: { matchLabels: { app: evaluation-service } }
  template:
    metadata: { labels: { app: evaluation-service } }
    spec:
      containers:
        - name: evaluation-service
          image: 604720765096.dkr.ecr.us-east-1.amazonaws.com/togglemaster-evaluation:v1.0.0-37e61be
          imagePullPolicy: Always
          ports: [ { containerPort: 8004 } ]
          # aws-credentials injeta AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY e
          # AWS_SESSION_TOKEN necessários para o SDK chamar SQS.
          # No AWS Academy os nodes EKS não herdam credenciais via Instance Profile,
          # então as credenciais precisam ser fornecidas explicitamente.
          # O secret é criado manualmente: kubectl create secret generic aws-credentials ...
          envFrom:
            - secretRef:
                name: aws-credentials
                optional: true   # não quebra o pod se o secret ainda não existir
          env:
            - { name: PORT, value: "8004" }
            - name: REDIS_URL
              valueFrom: { configMapKeyRef: { name: togglemaster-config, key: REDIS_URL } }
            - name: FLAG_SERVICE_URL
              valueFrom: { configMapKeyRef: { name: togglemaster-config, key: FLAG_SERVICE_URL } }
            - name: TARGETING_SERVICE_URL
              valueFrom: { configMapKeyRef: { name: togglemaster-config, key: TARGETING_SERVICE_URL } }
            - name: AWS_REGION
              valueFrom: { configMapKeyRef: { name: togglemaster-config, key: AWS_REGION } }
            - name: AWS_SQS_URL
              valueFrom: { configMapKeyRef: { name: togglemaster-config, key: AWS_SQS_URL } }
            - name: SERVICE_API_KEY
              valueFrom: { secretKeyRef: { name: evaluation-extra-secret, key: SERVICE_API_KEY } }
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          readinessProbe: { httpGet: { path: /health, port: 8004 }, initialDelaySeconds: 10, periodSeconds: 5 }
          livenessProbe:  { httpGet: { path: /health, port: 8004 }, initialDelaySeconds: 30, periodSeconds: 15 }

