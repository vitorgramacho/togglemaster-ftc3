# =============================================================================
# auth-postgres-init Job
#
# Correções vs versão anterior:
# 1) Adicionado separador `---` entre Job e ConfigMap (estava faltando).
# 2) `config_map` -> `configMap` (era typo, manifest inválido).
# 3) Secret key passou de "DB_PASS_0" para "DB_PASSWORD" (compatível com
#    o que o módulo k8s-bootstrap do Terraform cria).
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: auth-postgres-init
  namespace: auth-namespace
spec:
  backoffLimit: 4
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: psql
          image: postgres:15-alpine
          command: ["sh", "-c"]
          args:
            - |
              psql -h "$DB_HOST" -U "$DB_USER" -d "$DB_NAME" -f /mnt/init.sql
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: togglemaster-db-secret
                  key: DB_HOST
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: togglemaster-db-secret
                  key: DB_USER
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: togglemaster-db-secret
                  key: DB_NAME
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: togglemaster-db-secret
                  key: DB_PASSWORD
          volumeMounts:
            - name: init-sql
              mountPath: /mnt
      volumes:
        - name: init-sql
          configMap:
            name: auth-postgres-init-cm
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-postgres-init-cm
  namespace: auth-namespace
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS api_keys (
        id SERIAL PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        key_hash VARCHAR(64) NOT NULL UNIQUE,
        is_active BOOLEAN DEFAULT true,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );
