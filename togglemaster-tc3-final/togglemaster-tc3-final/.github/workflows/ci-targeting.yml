# Pipeline CI/CD do microsserviço "targeting".
# Toda a lógica está em _reusable-cicd.yml.

name: CI - targeting-service

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'services/targeting-service/**'
      - 'gitops/base/targeting/**'
      - '.github/workflows/ci-targeting.yml'
      - '.github/workflows/_reusable-cicd.yml'
  push:
    branches: [ main ]
    paths:
      - 'services/targeting-service/**'
      - 'gitops/base/targeting/**'
      - '.github/workflows/ci-targeting.yml'
      - '.github/workflows/_reusable-cicd.yml'

jobs:
  cicd:
    uses: ./.github/workflows/_reusable-cicd.yml
    with:
      service: targeting
      language: python
      ecr_repository: togglemaster-targeting
      gitops_path: gitops/base/targeting/deployment.yaml
    secrets:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN:     ${{ secrets.AWS_SESSION_TOKEN }}
      GITOPS_TOKEN:          ${{ secrets.GITOPS_TOKEN }}
