# Pipeline CI/CD do microsserviço "auth".
# Toda a lógica está em _reusable-cicd.yml.

name: CI - auth-service

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'services/auth-service/**'
      - 'gitops/base/auth/**'
      - '.github/workflows/ci-auth.yml'
      - '.github/workflows/_reusable-cicd.yml'
  push:
    branches: [ main ]
    paths:
      - 'services/auth-service/**'
      - 'gitops/base/auth/**'
      - '.github/workflows/ci-auth.yml'
      - '.github/workflows/_reusable-cicd.yml'

jobs:
  cicd:
    uses: ./.github/workflows/_reusable-cicd.yml
    with:
      service: auth
      language: go
      ecr_repository: togglemaster-auth
      gitops_path: gitops/base/auth/deployment.yaml
    secrets:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN:     ${{ secrets.AWS_SESSION_TOKEN }}
      GITOPS_TOKEN:          ${{ secrets.GITOPS_TOKEN }}
