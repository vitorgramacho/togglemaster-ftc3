# Pipeline CI/CD do microsserviço "evaluation".
# Toda a lógica está em _reusable-cicd.yml.

name: CI - evaluation-service

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'services/evaluation-service/**'
      - 'gitops/base/evaluation/**'
      - '.github/workflows/ci-evaluation.yml'
      - '.github/workflows/_reusable-cicd.yml'
  push:
    branches: [ main ]
    paths:
      - 'services/evaluation-service/**'
      - 'gitops/base/evaluation/**'
      - '.github/workflows/ci-evaluation.yml'
      - '.github/workflows/_reusable-cicd.yml'

jobs:
  cicd:
    uses: ./.github/workflows/_reusable-cicd.yml
    with:
      service: evaluation
      language: go
      ecr_repository: togglemaster-evaluation
      gitops_path: gitops/base/evaluation/deployment.yaml
    secrets:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN:     ${{ secrets.AWS_SESSION_TOKEN }}
      GITOPS_TOKEN:          ${{ secrets.GITOPS_TOKEN }}
